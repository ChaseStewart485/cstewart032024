<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmiLY</title>
    <style>
        
        #canvas
        {
            border: 2px solid black;
            margin: auto;
            display: block;
        }
    </style>
</head>
<body>
    <h1>SmiLy</h1>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = window.document.querySelector('#canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;
        canvas.style.backgroundColor = 'black';
        

        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(400, 290, 200, 200, 0, 1);
        ctx.fill();
        ctx.closePath();

        ctx.fillStyle = 'blue';
        ctx.beginPath();
        ctx.arc(400, 290, 20, 20, 0, 1);
        ctx.fill();




    </script>




</body>
</html>
